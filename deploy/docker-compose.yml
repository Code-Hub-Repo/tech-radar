services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techradar}
      POSTGRES_USER: ${POSTGRES_USER:-techradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18 moved PGDATA under a version-namespaced subdirectory of /var/lib/postgresql —
      # mounting the old /var/lib/postgresql/data path silently creates an empty, wrong-path database.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techradar} -d ${POSTGRES_DB:-techradar}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
